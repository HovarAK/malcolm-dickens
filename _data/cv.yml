  sections:
    Education:
      - institution: University of Maryland, Baltimore County
        location: Baltimore, MD
        area: Computer Science and Mathematics
        studyType: Bachelor of Science
        start_date: 2022
        end_date: 2026
        highlights:
          - Expected May 2026. GPA: 3.82/4.00.
          - >
            Relevant mathematics coursework: linear algebra, differential equations, mathematical reasoning,
            stochastic processes, statistical computing, matrix analysis, and numerical linear algebra.
          - >
            Relevant computing coursework: machine learning, artificial intelligence, design and analysis of
            algorithms, data structures, software engineering, and database management systems.

    Experience:
      - company: Texas State University SIAM-Simons Undergraduate Summer Research Program
        position: Research Intern, Algorithm Optimization
        location: San Marcos, TX
        start_date: 2025
        end_date: 2025
        highlights:
          - >
            Optimized a fairness-constrained spectral clustering method by improving numerical stability on
            singular graph weight matrices and analyzing asymptotic runtime.
          - >
            Implemented and benchmarked spectral graph algorithms in MATLAB on stochastic block model
            datasets, identifying structural edge cases that degraded performance.
          - >
            Re-derived eigenvalue bounds for normalized Laplacian-style operators and contributed to a
            research manuscript in LaTeX.

      - company: Brown University Leadership Alliance SR-EIP
        position: Research Intern, Data Systems
        location: Providence, RI
        start_date: 2024
        end_date: 2024
        highlights:
          - >
            Built modular MATLAB tooling for neuroscience decision-making experiments, with reproducible
            acquisition and preprocessing workflows.
          - >
            Improved timing and logging infrastructure to support high-fidelity behavioral and eye-tracking
            data collection.
          - Presented technical findings at the Leadership Alliance National Symposium.

      - company: Tufts University DIAMONDS REU Program
        position: Research Intern, ML Systems
        location: Medford, MA
        start_date: 2023
        end_date: 2023
        highlights:
          - >
            Designed an in-context learning pipeline using Meta's LLaMA model to generate citation syntax
            from paper metadata.
          - >
            Accelerated inference on an HPC cluster with CUDA and batched GPU jobs, reducing runtime from
            roughly 1 to 2 hours to about 20 minutes.
          - >
            Structured evaluation runs to support systematic prompt iteration and model-output comparison.

      - company: University of Maryland, Baltimore County
        position: Teaching Fellow
        location: Baltimore, MD
        start_date: 2024
        end_date: 2025
        highlights:
          - Supported CMSC 201, CMSC 202, and CMSC 341 through weekly labs, office hours, and code review.
          - >
            Helped students build intuition for Python programming, object-oriented design in C++, and core
            data-structure and algorithm concepts.
          - >
            Focused on debugging discipline, conceptual clarity, and approachable explanations for abstract
            material.

    Awards:
      - title: Meyerhoff Scholar
        date: 2023
