        awarder: University of Maryland, Baltimore County
        summary: Academic distinctions earned across multiple semesters.

    Projects:
      - name: Fairness-Constrained Spectral Clustering Study
        url: /projects/fairness-spectral-clustering/
        summary: Research project on numerically stable clustering methods under group proportion constraints.
        highlights:
          - MATLAB implementation, benchmarking, and matrix analysis.
          - Focus on robustness, asymptotic reasoning, and edge-case analysis.
      - name: VISA Case Management Portal
        url: /projects/visa-case-management-portal/
        summary: Full-stack case management portal built with Next.js, Express, and MySQL.
        highlights:
          - Authentication flows, API integration, schema-backed persistence, and deployment workflow.
      - name: Neuroscience Experiment Data Pipeline
        url: /projects/neuroscience-data-pipeline/
        summary: Reproducible data acquisition and preprocessing tooling for decision-making experiments.
        highlights:
          - MATLAB workflow design, parameter logging, and reliable handoff for collaborative research.
      - name: LLaMA HPC Inference Pipeline
        url: /projects/llama-hpc-pipeline/
        summary: GPU-accelerated in-context learning workflow for metadata-to-citation generation.
        highlights:
          - CUDA-enabled execution, batched jobs, and prompt evaluation on an HPC cluster.

